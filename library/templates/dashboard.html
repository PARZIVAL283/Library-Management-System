{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="text-center mb-4">Your Books</h2>

    <div class="row">
        {% for issue in issues %}
        <div class="col-md-6 mb-3">
            <div class="card p-3">
                <h5 style="color: white;">{{ issue.book.title }}</h5>
                <p style="color: chartreuse;">Issued: {{ issue.issue_date }}</p>

                <p style="color: tomato;">
                    Fine:
                    <span class="text-danger fw-bold">
                        {{ issue.calculate_fine }} BDT
                    </span>
                </p>

                {% if not issue.return_date %}
                    <a href="/return/{{ issue.id }}/" class="btn btn-warning btn-sm">Return</a>
                {% else %}
                    <span class="text-success">Returned</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
