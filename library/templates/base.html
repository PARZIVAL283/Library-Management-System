{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Library System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">HOME</a>

        <!-- Toggle Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto mt-2 mt-lg-0">

                <a href="/books/" class="btn btn-outline-light btn-sm me-2 mb-2">Books</a>

                {% if user.is_authenticated %}
                    <a href="/dashboard/" class="btn btn-warning btn-sm me-2 mb-2">Dashboard</a>
                    <a href="/logout/" class="btn btn-danger btn-sm mb-2">Logout</a>
                {% else %}
                    <a href="/login/" class="btn btn-success btn-sm me-2 mb-2">Login</a>
                    <a href="/register/" class="btn btn-primary btn-sm mb-2">Register</a>
                {% endif %}

            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}   
</div>


</body>
</html>
