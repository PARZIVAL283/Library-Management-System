{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="mb-4 text-center">Library Books</h2>

    <div class="row">
        {% for book in page_obj %}
        <div class="col-md-4 col-sm-6 mb-4">
            <div class="card p-3 h-100 text-center">
                <h5>{{ book.title }}</h5>
                <p>{{ book.author }}</p>

                {% if book.available %}
                    <a href="/issue/{{ book.id }}/" class="btn btn-success btn-sm">Issue</a>
                {% else %}
                    <span class="text-danger">Not Available</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<div class="col-md-4 col-sm-6 mb-4 fade-up" 
style="animation-delay: {{ forloop.counter0 }}00ms;">
</div>


{% endblock %}
